<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Tracker Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Simple board tracker</p>
          <h1>Keep projects moving without the clutter.</h1>
          <p class="hero-copy">
            A lightweight board for ideas, active work, and finished tasks.
            It saves on your device and can generate a share link when you want
            to open the same board elsewhere.
          </p>
          <p id="updated-at" class="updated-at"></p>
        </div>

        <div class="hero-actions">
          <button id="copy-link-button" class="primary-button">
            Copy share link
          </button>
          <button id="export-button" class="ghost-button" type="button">
            Export board
          </button>
          <label class="import-button ghost-button" for="import-input">
            Import board
          </label>
          <button id="reset-button" class="ghost-button">Reset board</button>
          <p id="status-message" class="status-message" aria-live="polite"></p>
        </div>
      </header>

      <section class="toolbar">
        <div class="filters">
          <label>
            <span>Search</span>
            <input id="search-input" type="search" placeholder="Search tasks or descriptions" />
          </label>

          <label>
            <span>Priority</span>
            <select id="priority-filter">
              <option value="all">All priorities</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </label>

          <label>
            <span>Label</span>
            <select id="label-filter">
              <option value="all">All labels</option>
              <option value="none">No label</option>
              <option value="sunset">Sunset</option>
              <option value="ocean">Ocean</option>
              <option value="moss">Moss</option>
              <option value="berry">Berry</option>
              <option value="slate">Slate</option>
            </select>
          </label>

          <button id="clear-filters-button" class="ghost-button" type="button">
            Clear filters
          </button>

          <label>
            <span>View</span>
            <select id="view-mode-select">
              <option value="board">Board</option>
              <option value="list">Compact list</option>
            </select>
          </label>
        </div>

        <form id="task-form" class="task-form">
          <label>
            <span>Task</span>
            <input
              id="task-title"
              name="title"
              type="text"
              maxlength="80"
              placeholder="Ship landing page"
              required
            />
          </label>

          <label>
            <span>Details</span>
            <textarea
              id="task-details"
              name="details"
              maxlength="280"
              rows="2"
              placeholder="Refine the mobile layout and publish"
            ></textarea>
          </label>

          <label>
            <span>Column</span>
            <select id="task-column" name="column">
              <option value="todo">To Do</option>
              <option value="doing">In Progress</option>
              <option value="done">Done</option>
            </select>
          </label>

          <label>
            <span>Due date</span>
            <input id="task-date" name="date" type="date" />
          </label>

          <label>
            <span>Priority</span>
            <select id="task-priority" name="priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </label>

          <label>
            <span>Color label</span>
            <select id="task-label" name="label">
              <option value="">No label</option>
              <option value="sunset">Sunset</option>
              <option value="ocean">Ocean</option>
              <option value="moss">Moss</option>
              <option value="berry">Berry</option>
              <option value="slate">Slate</option>
            </select>
          </label>

          <button type="submit" class="primary-button">Add task</button>
        </form>
      </section>

      <main id="board" class="board" aria-label="Project tracker board"></main>
    </div>

    <input id="import-input" type="file" accept="application/json" hidden />

    <template id="column-template">
      <section class="column">
        <div class="column-header">
          <div>
            <p class="column-kicker"></p>
            <input class="column-title-input" type="text" maxlength="24" aria-label="Column title" />
          </div>
          <span class="task-count"></span>
        </div>
        <div class="column-dropzone"></div>
        <p class="empty-column-message"></p>
      </section>
    </template>

    <template id="card-template">
      <article class="task-card" draggable="true">
        <div class="task-card-copy">
          <div class="task-title-row">
            <input class="task-title-input" type="text" maxlength="80" aria-label="Task title" />
            <select class="task-priority-input" aria-label="Task priority">
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <label class="details-field">
            <span>Description</span>
            <textarea class="task-details-input" rows="3" maxlength="280"></textarea>
          </label>
          <div class="task-label-row">
            <span class="task-label-chip"></span>
            <select class="task-label-input" aria-label="Task color label">
              <option value="">No label</option>
              <option value="sunset">Sunset</option>
              <option value="ocean">Ocean</option>
              <option value="moss">Moss</option>
              <option value="berry">Berry</option>
              <option value="slate">Slate</option>
            </select>
          </div>
        </div>
        <div class="task-meta">
          <label class="date-field">
            <span>Date</span>
            <input class="task-date-input" type="date" aria-label="Task due date" />
          </label>
          <span class="date-status-pill"></span>
        </div>
        <div class="subtasks">
          <div class="subtasks-header">
            <span>Checklist</span>
            <span class="subtasks-count"></span>
          </div>
          <div class="subtasks-list"></div>
          <div class="subtask-form">
            <input class="subtask-input" type="text" maxlength="80" placeholder="Add a checklist item" />
            <button class="ghost-button subtask-add-button" type="button">Add</button>
          </div>
        </div>
        <div class="task-card-actions">
          <button class="icon-button" data-action="move-left" aria-label="Move left">
            ←
          </button>
          <button class="icon-button" data-action="move-right" aria-label="Move right">
            →
          </button>
          <button class="icon-button danger" data-action="delete" aria-label="Delete task">
            ×
          </button>
        </div>
      </article>
    </template>

    <template id="subtask-template">
      <label class="subtask-item">
        <input class="subtask-checkbox" type="checkbox" />
        <span class="subtask-text"></span>
        <button class="subtask-delete-button" type="button" aria-label="Delete checklist item">
          ×
        </button>
      </label>
    </template>
    <script src="./app.js"></script>
  </body>
</html>
